<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feedback Form</title>

    <!-- Bootstrap CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Internal CSS -->
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }
        .container {
            max-width: 600px;
            background: #fff;
            padding: 20px;
            margin: 50px auto;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            color: #007bff;
        }
        .form-label {
            font-weight: bold;
        }
        .btn-primary {
            width: 100%;
        }
        .rating {
            display: flex;
            justify-content: space-between;
        }
        .rating input {
            display: none;
        }
        .rating label {
            font-size: 24px;
            cursor: pointer;
            color: #ccc;
        }
        .rating input:checked ~ label {
            color: #007bff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="text-center">Feedback Form</h2>
        <p class="text-center">We appreciate your feedback!</p>

        <form>
            <!-- Name (Optional) -->
            <div class="mb-3">
                <label class="form-label">Name (Optional)</label>
                <input type="text" class="form-control" placeholder="Enter your name">
            </div>

            <!-- Email (Optional) -->
            <div class="mb-3">
                <label class="form-label">Email (Optional)</label>
                <input type="email" class="form-control" placeholder="Enter your email">
            </div>

            <!-- Phone (Optional) -->
            <div class="mb-3">
                <label class="form-label">Phone (Optional)</label>
                <input type="tel" class="form-control" placeholder="Enter your phone number">
            </div>

            <!-- Rating -->
            <div class="mb-3">
                <label class="form-label">Rate our service</label>
                <div class="rating">
                    <input type="radio" id="star5" name="rating" value="5"><label for="star5">⭐</label>
                    <input type="radio" id="star4" name="rating" value="4"><label for="star4">⭐</label>
                    <input type="radio" id="star3" name="rating" value="3"><label for="star3">⭐</label>
                    <input type="radio" id="star2" name="rating" value="2"><label for="star2">⭐</label>
                    <input type="radio" id="star1" name="rating" value="1"><label for="star1">⭐</label>
                </div>
            </div>

            <!-- Questions regarding product/service -->
            <div class="mb-3">
                <label class="form-label">Any Questions Regarding Product or Service?</label>
                <textarea class="form-control" rows="3" placeholder="Write your questions here..."></textarea>
            </div>

            <!-- Additional Comments (Optional) -->
            <div class="mb-3">
                <label class="form-label">Additional Comments (Optional)</label>
                <textarea class="form-control" rows="3" placeholder="Share any additional feedback..."></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary">Submit Feedback</button>
        </form>
    </div>

</body>
</html>
